<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Burnlist</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1> Burnlist</h1>
  <p>Create a mood-based playlist: each track removes itself after you hear 20 seconds or if you skip it.</p>

  <label for="mood">Select your mood:</label>
  <select id="mood">
    <option value="happy">😄 Happy</option>
    <option value="sad">😢 Sad</option>
    <option value="angry">😡 Angry</option>
    <option value="chill">😌 Chill</option>
    <option value="love">💖 Love</option>
    <option value="hype">🚀 Hype</option>
  </select>

  <label for="song-count">Number of songs (1–50):</label>
  <input type="number" id="song-count" min="1" max="50" value="15">

  <button id="login-btn">Login with Spotify</button>
  <p id="status"></p>
  <div id="burn-panel" hidden>
    <p><a id="open-playlist-link" href="#" target="_blank" rel="noopener">Open playlist in Spotify</a></p>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
